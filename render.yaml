services:
  - type: keyvalue
    name: cashflowcoin-redis
    plan: free
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off

  - type: web
    name: cashflowcoin-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "10000"
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=75.0 -XX:+UseSerialGC"
      - key: DATABASE_URL
        fromDatabase:
          name: cashflowcoin-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cashflowcoin-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cashflowcoin-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: cashflowcoin-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: cashflowcoin-redis
          property: port
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: cashflowcoin
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: cashflowcoin-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

databases:
  - name: cashflowcoin-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
    databaseName: cryptopal
    user: cryptopal
    ipAllowList: []