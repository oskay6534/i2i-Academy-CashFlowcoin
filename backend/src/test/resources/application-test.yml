spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:cryptopal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
