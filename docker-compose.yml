#our project services
services:
  postgres:
    image: postgres:16
    container_name: cryptopal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptopal
      POSTGRES_USER: cryptopal
      POSTGRES_PASSWORD: cryptopal123
    ports:
      - "55432:5432"
    volumes:
      - cryptopal_postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration/V1__initial_schema.sql:/docker-entrypoint-initdb.d/01-initial-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptopal -d cryptopal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cryptopal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cryptopal_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cryptopal_postgres_data:
  cryptopal_redis_data:
